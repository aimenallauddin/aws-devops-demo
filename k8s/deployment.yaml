apiVersion: apps/v1
kind: Deployment
metadata:
  name: aws-devops-demo
  labels:
    app: aws-devops-demo
spec:
  # Run 2 copies of the pod for basic redundancy
  replicas: 2

  # Tell Kubernetes which pods this deployment manages
  selector:
    matchLabels:
      app: aws-devops-demo

  # Rolling update: bring up new pods before killing old ones.
  # maxUnavailable: 0 means zero-downtime deploys.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: aws-devops-demo
    spec:
      # Security: run as a non-root user (UID 1001 set in Dockerfile)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001

      containers:
        - name: app
          # Image is replaced by the CI/CD pipeline on every deploy
          image: PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 3000

          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"

          # Resource limits prevent one pod starving others on the node
          resources:
            requests:
              cpu: 100m       # Minimum CPU guaranteed to this pod
              memory: 128Mi   # Minimum memory guaranteed
            limits:
              cpu: 500m       # Maximum CPU this pod can use
              memory: 512Mi   # Maximum memory — pod is killed if exceeded

          # Readiness probe: only send traffic once the app responds on /health.
          # Prevents users hitting a pod that isn't ready yet.
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10

          # Liveness probe: restart the pod if it stops responding.
          # Catches deadlocks or hung processes.
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
