apiVersion: apps/v1
kind: Deployment
metadata:
  name: aws-devops-demo
  labels:
    app: aws-devops-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aws-devops-demo
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0        # Zero-downtime deploys
  template:
    metadata:
      labels:
        app: aws-devops-demo
    spec:
      # Run as non-root for security
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: app
          image: PLACEHOLDER   # Replaced by CI/CD pipeline
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # Only send traffic when the app is ready
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          # Restart if the app becomes unresponsive
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
