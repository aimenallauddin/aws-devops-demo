name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: aws-devops-demo
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  

jobs:
  # ─────────────────────────────────────────────────────────────
  # BUILD & PUSH
  # Builds a Docker image and pushes it to AWS ECR.
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    # Exposing the image tag to any future jobs that need it
    outputs:
      image-tag: ${{ steps.vars.outputs.short-sha }}

    steps:
      # 1. Checking out the repository code onto the runner
      - name: Checkout code
        uses: actions/checkout@v4
        - name: List files in repository
        run: |
          echo "Current directory: $(pwd)"
          ls -R

      # 2. Creating a short Git SHA to use as the image tag.
      - name: Set image tag from Git SHA
        id: vars
        run: echo "short-sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # 3. Setting up AWS credentials from GitHub Secrets.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 4. Authenticating Docker with ECR so we can push images
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 5. Building the Docker image using our multi-stage Dockerfile,
      #    tagging it with the Git SHA, and pushing it to ECR.
      - name: Build, tag, and push image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.vars.outputs.short-sha }}
        run: |
          # Build the image
          docker build -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

          # Push the SHA-tagged image (immutable, traceable)
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          # Also push as 'latest' for easy reference
          docker tag $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                     $REGISTRY/$ECR_REPOSITORY:latest
          docker push $REGISTRY/$ECR_REPOSITORY:latest

      # 6. Printing a summary
      - name: Print image details
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.vars.outputs.short-sha }}
        run: |
          echo "✅ Image pushed successfully"
          echo "   Registry : $REGISTRY"
          echo "   Repo     : $ECR_REPOSITORY"
          echo "   Tag      : $IMAGE_TAG"

